name: ReverbEx-Piradex-macOS

on:
  push:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar CMake
        run: brew install cmake

      - name: Configurar projeto
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Compilar plugin
        run: cmake --build build --config Release --parallel

      - name: Empacotar artefactos
        run: |
          mkdir -p artifacts
          find build -name "*.vst3" -exec cp -r {} artifacts/ \; || true
          find build -name "*.component" -exec cp -r {} artifacts/ \; || true

      - name: Guardar plugin compilado
        uses: actions/upload-artifact@v4
        with:
          name: ReverbEx-Piradex-macOS
          path: artifacts/
          retention-days: 30

      - name: Guardar plugin compilado
        uses: actions/upload-artifact@v4
        with:
          name: ReverbEx-Piradex-macOS
          path: artifacts/
          retention-days: 30
