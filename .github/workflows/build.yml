name: Build REVERBEX by Piradex

on:
  push:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar CMake
        run: brew install cmake

      - name: Configurar projeto
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Compilar plugin
        run: cmake --build build --config Release

      - name: Empacotar artefactos
        run: |
          mkdir -p artifacts
          cp -r build/ReverbPlugin_artefacts/Release/VST3 artifacts/ || true
          cp -r build/ReverbPlugin_artefacts/Release/AU artifacts/ || true

      - name: Guardar plugin compilado
        uses: actions/upload-artifact@v4
        with:
          name: ReverbEx-Piradex-macOS
          path: artifacts/
          retention-days: 30
